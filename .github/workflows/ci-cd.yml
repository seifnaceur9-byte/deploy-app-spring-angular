name: CI/CD - SpringBoot Angular MySQL

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout du code source
        uses: actions/checkout@v3

  
      - name: Installation de Java JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

     
      - name: Cache des dépendances Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

 
      - name: Build Maven du Backend
        run: |
          cd springboot/app
          mvn clean package -DskipTests

 
      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

     
      - name: Build de l'image Docker Backend
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest \
            ./springboot/app

      
      - name: Build de l'image Docker Frontend
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest \
            ./angular-app

  
      - name: Push de l'image Backend vers Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      - name: Push de l'image Frontend vers Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

     
      - name: Lancement de l'application avec Docker Compose
        run: |
          docker compose up -d

      - name: Attendre que les services soient prêts
        run: |
          echo "Attente du démarrage des conteneurs..."
          sleep 20

      - name: Vérification que les conteneurs sont en cours d'exécution
        run: |
          docker compose ps
          docker compose ps | grep -v "Exit" | grep -v "NAME"

      - name: Vérification de la communication Frontend → Backend
        run: |
          echo "Vérification des services en cours..."
          docker compose logs --tail=30

      - name: Arrêt des conteneurs de test
        if: always()
        run: |
          docker compose down
